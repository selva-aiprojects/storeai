<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StoreAI | Multi-Tenant Intelligence</title>
    <link rel="icon" type="image/png" href="/logo-mt.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Outfit', sans-serif;
        }
        /* Splash Screen Config - Removed by React Hydration */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #020617;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        .splash-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: pulse-glow 2s infinite ease-in-out;
            filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.3));
        }
        .splash-loader {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .splash-loader::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border-radius: 4px;
            animation: loading-bar 1.5s infinite ease-in-out;
        }
        .splash-text {
            margin-top: 15px;
            color: #64748b;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            animation: fade-pulse 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.5)); }
        }
        @keyframes loading-bar {
            0% { left: -30%; }
            100% { left: 100%; }
        }
        @keyframes fade-pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>

<body class="bg-[#020617]">
    <!-- BUILD_ID: 2026_02_05_v3_2_0_UPDATED_BRANDING -->
    <div id="root">
        <!-- Initial Splash Content (Replaced by React) -->
         <div id="splash-screen">
            <img src="/logo-mt.png" alt="StoreAI" class="splash-logo" />
            <div class="splash-loader"></div>
            <div class="splash-text">System Initializing...</div>
        </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
