image: node:22

pipelines:
  branches:
    main:
      - step:
          name: Build and Test Full Stack
          caches:
            - node
          script:
            - cd server
            - npm install
            - npx prisma generate
            - npm run build
            - cd ../client
            - npm install
            - npm run build
          artifacts:
            - client/dist/**
            - server/dist/**
      - step:
          name: Cypress E2E Regression
          image: cypress/included:15.10.0
          caches:
            - node
          script:
            - cd server
            - npm install
            - npx prisma generate
            - npm run dev > ../server-e2e.log 2>&1 &
            - cd ../client
            - npm install
            - npm run dev -- --host 0.0.0.0 --port 3000 > ../client-e2e.log 2>&1 &
            - |
              for i in {1..45}; do
                if curl -sSf http://127.0.0.1:5000/ >/dev/null && curl -sSf http://127.0.0.1:3000/ >/dev/null; then
                  echo "Server and client are ready"
                  break
                fi
                sleep 2
              done
            - npx cypress run --headless --browser electron --spec cypress/e2e/regression.cy.ts --config baseUrl=http://127.0.0.1:3000,video=false,retries=0,defaultCommandTimeout=10000,pageLoadTimeout=30000
          after-script:
            - cat ../server-e2e.log || true
            - cat ../client-e2e.log || true
