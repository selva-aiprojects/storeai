services:
  # Node.js Backend Service (Docker)
  - type: web
    name: store-ai-server
    env: docker
    rootDir: server
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # You will enter this in dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Python AI Backend Service
  - type: web
    name: store-ai-python
    env: python
    rootDir: ../python_backend
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET
        fromService:
          type: web
          name: store-ai-server
          envVarKey: JWT_SECRET
      - key: PORT
        value: 8000

  # Frontend Service (Static Site)
  - type: static
    name: store-ai-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: store-ai-server
          property: url
      - key: VITE_AI_API_URL
        fromService:
          type: web
          name: store-ai-python
          property: url
