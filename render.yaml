services:
  # Backend Service (Docker)
  - type: web
    name: store-ai-server
    env: docker
    rootDir: server
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # You will enter this in dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000

  # Frontend Service (Static Site)
  - type: static
    name: store-ai-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: store-ai-server
          property: url
