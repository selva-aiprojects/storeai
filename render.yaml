services:
  # Node.js Backend Service (Docker)
  - type: web
    name: store-ai-server
    env: docker
    rootDir: main/server
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # You will enter this in dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: AUTO_FIX_ADMIN_ON_BOOT
        value: true
      - key: INITIAL_ADMIN_EMAIL
        value: admin@storeai.com
      - key: INITIAL_ADMIN_PASSWORD
        value: Admin@123
      - key: INITIAL_ADMIN_TENANT_SLUG
        value: storeai

  # Python AI Backend Service
  - type: web
    name: store-ai-python
    env: python
    rootDir: python_backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET
        fromService:
          type: web
          name: store-ai-server
          envVarKey: JWT_SECRET
      - key: RAG_PREWARM_ON_STARTUP
        value: "false"
      - key: ANONYMIZED_TELEMETRY
        value: "false"
      - key: PYTHON_VERSION
        value: 3.11.11

  # Frontend Service (Static Site)
  - type: web
    name: store-ai-client
    runtime: static
    rootDir: main/client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: store-ai-server
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_AI_API_URL
        fromService:
          type: web
          name: store-ai-python
          envVarKey: RENDER_EXTERNAL_URL
